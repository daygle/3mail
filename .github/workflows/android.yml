name: Android CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # local.properties is checked in with a developer-specific (Windows) sdk.dir,
      # so point it at the runner's SDK instead of the committed value.
      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # gradle-wrapper.jar is committed, but we specify the version here to match.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"

      - name: Run unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: gradle assembleDebug --stacktrace

      # Runs Android lint but does not gate the build yet: the project has no
      # baseline, so pre-existing findings shouldn't turn CI red on the first
      # run. Flip continue-on-error off (or add a lint baseline) once the
      # report is clean.
      - name: Android lint
        continue-on-error: true
        run: gradle lintDebug --stacktrace

      # Lint's console output only details the first failure; dump the full
      # text report so every finding is visible in the log without having to
      # download the uploaded artifact.
      - name: Print lint report
        if: always()
        run: |
          echo '::group::Full lint text report'
          cat app/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt \
            || cat app/build/reports/lint-results-debug.txt \
            || echo "no lint text report found"
          echo '::endgroup::'

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.*
          if-no-files-found: ignore

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          if-no-files-found: ignore

  # Compose UI test runner: instrumented `connectedDebugAndroidTest`. Only
  # runs on merges to main (not on PRs) to keep macos emulator minutes
  # reasonable - reactivecircus/android-emulator-runner@v2 needs macos for
  # x86_64 host-accelerated boot and the AVD startup is slow enough that
  # running on every PR would dominate our CI budget.
  # (The action's latest published major is v2.x; prefix with @v2 so it
  # tracks the most recent patch release without pinning a frozen SHA.)
  android-test:
    name: Compose UI tests (instrumented)
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"

      - name: Run instrumented Compose UI tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          ram-size: 4096
          disk-size: 4096
          # macOS runners are shared and the AVD boot can be much slower than
          # the 600 s default; raise it to 20 minutes so a cold boot (no cached
          # snapshot) doesn't abort the CI run.
          emulator-boot-timeout: 1200
          disable-animations: true
          # macOS GitHub runners have no GPU or display, so stripping UI overhead
          # is essential to get the emulator to boot at all.
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: gradle connectedDebugAndroidTest --stacktrace

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: androidTest-report
          path: app/build/reports/androidTests/connectedDebugAndroidTest/
          if-no-files-found: ignore
