name: Android CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # local.properties is checked in with a developer-specific (Windows) sdk.dir,
      # so point it at the runner's SDK instead of the committed value.
      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # gradle-wrapper.jar is committed, but we specify the version here to match.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Android lint gates the build: the report is clean (0 errors), so any
      # newly introduced lint error should turn CI red. lintDebug aborts on
      # errors by default; warnings/hints do not fail the build.
      - name: Android lint
        run: ./gradlew lintDebug --stacktrace

      # Lint's console output only details the first failure; dump the full
      # text report so every finding is visible in the log without having to
      # download the uploaded artifact.
      - name: Print lint report
        if: always()
        run: |
          echo '::group::Full lint text report'
          cat app/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt \
            || cat app/build/reports/lint-results-debug.txt \
            || echo "no lint text report found"
          echo '::endgroup::'

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.*
          if-no-files-found: ignore

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          if-no-files-found: ignore
