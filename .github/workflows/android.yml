name: Android CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # local.properties is checked in with a developer-specific (Windows) sdk.dir,
      # so point it at the runner's SDK instead of the committed value.
      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # No gradle-wrapper.jar is committed, so install Gradle and run it directly
      # (version kept in sync with gradle/wrapper/gradle-wrapper.properties).
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.5"

      - name: Run unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          if-no-files-found: ignore
