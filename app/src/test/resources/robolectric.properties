# Global Robolectric configuration for all Robolectric unit tests.
#
# sdk=34: the app's merged manifest declares targetSdkVersion=35, but
# Robolectric 4.12.2 only ships framework images through API 34 (SDK 35 support
# arrived in Robolectric 4.13). Once testOptions.unitTests.isIncludeAndroidResources
# is enabled, Robolectric reads that manifest and would otherwise fail SDK
# selection with "Package targetSdkVersion=35 > maxSdkVersion=34". minSdk is 26,
# so 34 is a valid emulation target. Bump/remove when Robolectric is upgraded.
#
# application: force a stock android.app.Application. With android resources
# enabled Robolectric also honours the manifest's android:name=".ThreeMailApplication"
# and would boot the full Hilt application (ThreeMailApplication.onCreate ->
# Hilt injection -> Room database build), which is neither needed nor wanted by
# these plain RobolectricTestRunner unit tests - they construct their subjects
# directly. Booting it also surfaced an unrelated Room builder error at app
# startup. A stock Application keeps the app's resources available (so
# context.getString(R.string.*) still resolves) without running app startup.
sdk=34
application=android.app.Application
