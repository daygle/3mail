# Pin Robolectric's emulated Android SDK for all Robolectric unit tests.
#
# The app's merged manifest declares targetSdkVersion=35, but Robolectric
# 4.12.2 only ships framework images up to API 34 (SDK 35 support arrived in
# Robolectric 4.13). Once testOptions.unitTests.isIncludeAndroidResources is
# enabled, Robolectric reads that manifest and would otherwise fail SDK
# selection with "Package targetSdkVersion=35 > maxSdkVersion=34". Pinning to
# 34 keeps every Robolectric test on a supported image; minSdk is 26, so 34 is
# a valid emulation target. Bump/remove this when Robolectric is upgraded.
sdk=34
